<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Impostor de Fútbol</title>
    <link rel="icon" type="image/png" href="assets/img/logo.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ===== SPLASH SCREEN ===== -->
    <div id="screen-splash" class="screen active">
        <div class="screen-content">
            <div class="splash-logo" id="splash-logo">
                <div class="splash-icon">🎮</div>
                <div class="splash-brand">windosopensgame</div>
                <div class="splash-tagline">presents</div>
            </div>
        </div>
    </div>

    <!-- ===== HOME SCREEN ===== -->
    <div id="screen-home" class="screen">
        <div class="screen-content">
            <div class="logo">
                <img src="assets/img/logo.png" alt="Impostor de Fútbol" class="logo-img">
                <h1 data-i18n="title">IMPOSTOR DE FÚTBOL</h1>
            </div>
            <div class="menu-buttons">
                <button class="btn btn-primary btn-large" onclick="openSetup()" data-i18n="start">EMPEZAR</button>
                <button class="btn btn-secondary" onclick="openSettings()" data-i18n="settings">CONFIGURACIÓN</button>
            </div>
        </div>
    </div>

    <!-- ===== SETTINGS SCREEN ===== -->
    <div id="screen-settings" class="screen">
        <div class="screen-content">
            <h2 data-i18n="settings">CONFIGURACIÓN</h2>
            <div class="settings-group">
                <label data-i18n="language">Idioma</label>
                <div class="lang-buttons">
                    <button class="btn lang-btn selected" data-lang="es" onclick="selectLanguage('es')">
                        🇪🇸 <span data-i18n="spanish">Español</span>
                    </button>
                    <button class="btn lang-btn" data-lang="en" onclick="selectLanguage('en')">
                        🇬🇧 <span data-i18n="english">English</span>
                    </button>
                </div>
            </div>
            <button class="btn btn-secondary" onclick="initHome()" data-i18n="back">VOLVER</button>
        </div>
    </div>

    <!-- ===== SETUP SCREEN ===== -->
    <div id="screen-setup" class="screen">
        <div class="screen-content">
            <h2>⚙️ Setup</h2>

            <div class="setup-group">
                <label data-i18n="numPlayers">Número de jugadores</label>
                <div class="counter">
                    <button class="btn btn-counter" onclick="changeNumPlayers(-1)">−</button>
                    <span id="setup-num-players" class="counter-value">4</span>
                    <button class="btn btn-counter" onclick="changeNumPlayers(1)">+</button>
                </div>
            </div>

            <div class="setup-group" id="impostor-controls">
                <label data-i18n="numImpostors">Cantidad de impostores</label>
                <div class="counter">
                    <button class="btn btn-counter" onclick="changeNumImpostors(-1)">−</button>
                    <span id="setup-num-impostors" class="counter-value">1</span>
                    <button class="btn btn-counter" onclick="changeNumImpostors(1)">+</button>
                </div>
            </div>

            <div class="setup-group">
                <label data-i18n="gameMode">Modo de juego</label>
                <div class="mode-buttons">
                    <button class="btn mode-btn selected" data-mode="classic" onclick="selectMode('classic')">
                        <strong data-i18n="classic">Clásico</strong>
                        <small data-i18n="modeClassicDesc">1 impostor fijo. Deducción pura.</small>
                    </button>
                    <button class="btn mode-btn" data-mode="chaos" onclick="selectMode('chaos')">
                        <strong data-i18n="chaos">Caos</strong>
                        <small data-i18n="modeChaosDesc">Puede haber más impostores... ¡o todos serlo!</small>
                    </button>
                </div>
            </div>

            <div class="setup-buttons">
                <button class="btn btn-secondary" onclick="initHome()" data-i18n="back">VOLVER</button>
                <button class="btn btn-primary btn-large" onclick="goToNames()" data-i18n="next">SIGUIENTE</button>
            </div>
        </div>
    </div>

    <!-- ===== NAMES SCREEN ===== -->
    <div id="screen-names" class="screen">
        <div class="screen-content">
            <h2 data-i18n="enterNames">Ingresá los nombres</h2>
            <div id="names-container" class="names-container"></div>
            <div class="setup-buttons">
                <button class="btn btn-secondary" onclick="openSetup()" data-i18n="back">VOLVER</button>
                <button class="btn btn-primary btn-large" onclick="startGame()" data-i18n="startGame">INICIAR JUEGO</button>
            </div>
        </div>
    </div>

    <!-- ===== ROLE PASS SCREEN ===== -->
    <div id="screen-role-pass" class="screen">
        <div class="screen-content">
            <div class="pass-device">
                <span class="pass-icon">📱</span>
                <p data-i18n="passDevice">Pásale el dispositivo a</p>
                <h2 id="role-pass-name" class="player-highlight"></h2>
                <button id="btn-reveal-role" class="btn btn-primary btn-large pulse" onclick="revealRole()" data-i18n="revealRole">REVELAR MI ROL</button>
            </div>

            <div id="role-reveal-content" class="role-reveal hidden">
                <h2 id="role-title" class="role-title"></h2>
                <div id="role-info"></div>
                <button class="btn btn-primary btn-large" onclick="roleUnderstood()" data-i18n="understood">ENTENDIDO</button>
            </div>
        </div>
    </div>

    <!-- ===== DISCUSSION SCREEN ===== -->
    <div id="screen-discussion" class="screen">
        <div class="screen-content">
            <h2 data-i18n="discussionTitle">¡Tiempo de discusión!</h2>
            <p class="discussion-desc" data-i18n="discussionDesc">Describan al futbolista. ¿Quién es el impostor?</p>
            <div class="timer">
                <span id="timer-display" class="timer-display">2:00</span>
            </div>
            <button class="btn btn-primary btn-large" onclick="goToVoting()" data-i18n="goToVote">IR A VOTACIÓN</button>
        </div>
    </div>

    <!-- ===== VOTE PASS SCREEN ===== -->
    <div id="screen-vote-pass" class="screen">
        <div class="screen-content">
            <div class="pass-device">
                <h2 data-i18n="voteTitle">Turno de votar</h2>
                <p data-i18n="passDevice">Pásale el dispositivo a</p>
                <h2 id="vote-pass-name" class="player-highlight"></h2>
                <button id="btn-show-vote" class="btn btn-primary btn-large pulse" onclick="showVoteOptions()" data-i18n="voteFor">¿Quién creés que es el impostor?</button>
            </div>

            <div id="vote-content" class="vote-content hidden">
                <p data-i18n="voteFor">¿Quién creés que es el impostor?</p>
                <div id="vote-options" class="vote-options"></div>
                <button class="btn btn-ghost" onclick="skipVote()" data-i18n="skipVote">Saltar voto</button>
            </div>
        </div>
    </div>

    <!-- ===== RESULTS SCREEN ===== -->
    <div id="screen-results" class="screen">
        <div class="screen-content">
            <h2 data-i18n="resultsTitle">¡Resultados!</h2>
            <div id="results-content"></div>
            <div class="results-buttons">
                <button class="btn btn-primary btn-large" onclick="playAgain()" data-i18n="playAgain">JUGAR DE NUEVO</button>
                <button class="btn btn-secondary" onclick="initHome()" data-i18n="backToMenu">VOLVER AL MENÚ</button>
            </div>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/players-db.js"></script>
    <script src="js/game.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
